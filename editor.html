<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gobblegle — Board Editor</title>
    <style>
        :root {
            --primary: #c2410c;
            --primary-hover: #9a3412;
            --bg: #fdf8f4;
            --surface: #ffffff;
            --text: #1c0a00;
            --text-muted: #78614f;
            --border: #e8d5c4;
            --cell-active: #ffedd5;
            --cell-border-active: #fb923c;
            --error: #c9605a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        header {
            width: 100%; max-width: 540px; padding: 14px 16px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border); background: var(--surface);
        }
        .header-title { display: flex; align-items: center; gap: 8px; }
        .header-title img { height: 38px; width: auto; display: block; }
        .editor-badge {
            font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--primary);
            background: var(--cell-active); border: 1px solid var(--cell-border-active);
            padding: 3px 8px; border-radius: 6px;
        }

        .page {
            width: 100%; max-width: 540px; padding: 24px 16px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .card {
            background: var(--surface); border-radius: 14px; padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex; flex-direction: column; gap: 14px;
        }
        .card-title { font-size: 1rem; font-weight: 700; color: var(--text); }

        .field-label {
            font-size: 0.82rem; font-weight: 600; color: var(--text-muted);
            display: block; margin-bottom: 5px;
        }
        .field-input {
            width: 100%; padding: 9px 11px; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 0.9rem; background: var(--bg);
            color: var(--text); outline: none; font-family: inherit;
        }
        .field-input:focus { border-color: var(--primary); }

        .dim-controls { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .dim-ctrl { display: flex; align-items: center; gap: 6px; font-size: 0.88rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .dim-val { min-width: 22px; text-align: center; font-size: 1rem; font-weight: 700; color: var(--text); }
        .dim-btn {
            width: 28px; height: 28px; border: 1px solid var(--border);
            border-radius: 6px; background: var(--bg); font-size: 1.1rem;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .dim-btn:hover { background: var(--cell-active); }

        .hint { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
        .hint a { color: var(--primary); }

        .table-wrap { overflow-x: auto; }
        .editor-table { border-collapse: collapse; margin: 0 auto; }
        .editor-table td { padding: 3px; }
        .editor-table input {
            width: 46px; height: 46px; border: 2px solid var(--border);
            border-radius: 8px; font-size: 1.3rem; font-weight: 700;
            text-align: center; text-transform: uppercase;
            background: var(--bg); color: var(--text); outline: none;
        }
        .editor-table input:focus { border-color: var(--primary); background: var(--cell-active); }

        .actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
        .btn {
            background: var(--primary); color: #fff; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: 600;
            font-size: 0.9rem; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.6; cursor: default; }
        .btn-sec {
            background: transparent; color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-sec:hover { background: var(--bg); color: var(--text); }

        .status {
            font-size: 0.85rem; font-weight: 600; padding: 8px 12px;
            border-radius: 8px; display: none; line-height: 1.4;
        }
        .status.ok   { background: #dcfce7; color: #166534; display: block; }
        .status.err  { background: #fee2e2; color: #991b1b; display: block; }
        .status.info { background: var(--cell-active); color: var(--primary); display: block; }

        .gh-saved-indicator {
            font-size: 0.78rem; font-weight: 600; color: #166534;
            background: #dcfce7; border-radius: 6px; padding: 2px 8px;
            display: none;
        }
        .gh-saved-indicator.visible { display: inline-block; }

        #word-list-container {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .word-chips { display: flex; flex-wrap: wrap; gap: 4px 10px; }
        .word-chip  { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text); }

        /* ── Word-select modal ── */
        #word-select-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 1000;
            align-items: center; justify-content: center;
        }
        #word-select-modal.open { display: flex; }
        .ws-panel {
            background: var(--surface); border-radius: 14px;
            width: 92%; max-width: 460px; max-height: 82vh;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .ws-header {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            font-weight: 700; font-size: 1rem;
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .ws-col-labels {
            display: flex; align-items: center; padding: 4px 18px 4px;
            font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border);
        }
        .ws-col-labels span:first-child { flex: 1; }
        .ws-body { flex: 1; overflow-y: auto; }
        .ws-row {
            display: flex; align-items: center;
            padding: 5px 18px; border-bottom: 1px solid var(--border); gap: 6px;
        }
        .ws-word { flex: 1; font-size: 0.85rem; font-weight: 600; font-family: monospace; text-transform: uppercase; }
        .ws-btn {
            width: 28px; height: 28px; border: 2px solid; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 900; transition: all 0.12s; background: transparent;
            flex-shrink: 0;
        }
        .ws-btn-green { border-color: #bbf7d0; color: #bbf7d0; }
        .ws-btn-green.active { border-color: #16a34a; background: #16a34a; color: #fff; }
        .ws-btn-red { border-color: #fecaca; color: #fecaca; }
        .ws-btn-red.active { border-color: #dc2626; background: #dc2626; color: #fff; }
        .ws-footer {
            padding: 12px 18px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; justify-content: flex-end; align-items: center;
        }
        .ws-footer-note { flex: 1; font-size: 0.75rem; color: var(--text-muted); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<header>
    <div class="header-title">
        <img src="gobblegleturkey.png" alt="">
        <img src="gobblegletitle.png" alt="Gobblegle">
    </div>
    <span class="editor-badge">Board Editor</span>
</header>

<div class="page">

    <div class="card">
        <div class="card-title">Grid</div>
        <div class="dim-controls">
            <div class="dim-ctrl">
                Rows
                <button class="dim-btn" onclick="adjustDim('rows',-1)">−</button>
                <span class="dim-val" id="ed-rows">5</span>
                <button class="dim-btn" onclick="adjustDim('rows',1)">+</button>
            </div>
            <div class="dim-ctrl">
                Cols
                <button class="dim-btn" onclick="adjustDim('cols',-1)">−</button>
                <span class="dim-val" id="ed-cols">5</span>
                <button class="dim-btn" onclick="adjustDim('cols',1)">+</button>
            </div>
        </div>
        <div class="hint">Leave cells blank to create gaps. All letter cells must be connected (including diagonals).</div>
        <div class="table-wrap">
            <table class="editor-table" id="editor-table"></table>
        </div>
        <div style="font-size:0.85rem;font-weight:600;color:var(--text-muted);display:flex;align-items:center;justify-content:space-between;gap:8px;">
            <span>Valid words: <span id="word-count" style="color:var(--primary)">—</span></span>
            <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600;font-size:0.82rem;">
                <input type="checkbox" id="show-words-cb" onchange="renderWordList()" checked> Show words
            </label>
        </div>
        <div class="status" id="status"></div>
        <div class="actions">
            <button class="btn btn-sec" onclick="generateRandom()">Generate Random</button>
            <button class="btn btn-sec" onclick="fillRandom()">Fill Random</button>
            <button class="btn btn-sec" onclick="clearAll()">Clear</button>
            <button class="btn btn-sec" onclick="openWordSelect()">Select Words</button>
            <button class="btn btn-sec" onclick="testBoard()">Test</button>
        </div>
        <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div style="font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em">Scheduled Boards</div>
                <button class="btn" id="save-btn" onclick="saveBoard()">Save Board</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <button onclick="calPrevMonth()" style="background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:1.1rem;padding:2px 10px;font-family:inherit;color:var(--text);line-height:1.4">‹</button>
                <span id="cal-month-label" style="font-weight:700;font-size:0.9rem"></span>
                <button onclick="calNextMonth()" style="background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:1.1rem;padding:2px 10px;font-family:inherit;color:var(--text);line-height:1.4">›</button>
            </div>
            <div id="sched-calendar"></div>
            <div style="margin-top:6px;font-size:0.78rem;color:var(--text-muted);text-align:center">
                Saving to: <span id="cal-selected-date" style="font-weight:700;color:var(--text)"></span>
            </div>
        </div>

        <div id="word-list-container" style="display:none;"></div>
    </div>

</div>

<!-- Word-select modal -->
<div id="word-select-modal">
    <div class="ws-panel">
        <div class="ws-header">
            <span>Select Words</span>
            <button class="btn btn-sec" style="padding:4px 10px;font-size:0.82rem" onclick="closeWordSelect()">✕</button>
        </div>
        <div class="ws-col-labels">
            <span>Word</span>
            <span style="width:28px;text-align:center;color:#16a34a">✓</span>
            <span style="width:28px;text-align:center;color:#dc2626">✕</span>
        </div>
        <div class="ws-body" id="ws-body"></div>
        <div class="ws-footer">
            <span class="ws-footer-note">✓ approved &nbsp;·&nbsp; ✕ excluded from valid list</span>
            <button class="btn btn-sec" onclick="closeWordSelect()">Cancel</button>
            <button class="btn" onclick="applyWordSelections()">Set</button>
        </div>
    </div>
</div>

<script>
let editorRows = 5, editorCols = 5;

const firebaseConfig = {
    apiKey: "AIzaSyC5l8bUB0Yf4SofYtIl0l3vQY8qw3wVflA",
    authDomain: "gobblegle.firebaseapp.com",
    databaseURL: "https://gobblegle-default-rtdb.firebaseio.com",
    projectId: "gobblegle",
    storageBucket: "gobblegle.firebasestorage.app",
    messagingSenderId: "84213433658",
    appId: "1:84213433658:web:43cff77a4b1f48049ded01"
};
let db = null;
try { firebase.initializeApp(firebaseConfig); db = firebase.database(); } catch(e) {}

window.addEventListener('DOMContentLoaded', async () => {
    await loadWordSelections();
    await loadWordApprovals();
    initSchedCalendar(); // async in background — don't block editor startup
    try {
        if (db) {
            const snap = await db.ref('boardConfig').once('value');
            const cfg = snap.val();
            if (cfg) { editorRows = cfg.rows; editorCols = cfg.cols; buildEditorTable(false, cfg.cells); scheduleWordCount(); return; }
        }
    } catch {}
    try {
        const res = await fetch('./board-config.json', { cache: 'no-store' });
        if (res.ok) {
            const cfg = await res.json();
            editorRows = cfg.rows; editorCols = cfg.cols;
            buildEditorTable(false, cfg.cells);
            scheduleWordCount();
            return;
        }
    } catch {}
    buildEditorTable(false, null);
});

// ── Scheduled boards calendar ──────────────────────────────────────────────
let edSelectedDate = new Date().toISOString().slice(0, 10);
let edCalendarYear  = new Date().getFullYear();
let edCalendarMonth = new Date().getMonth();
let edAvailDates    = null; // cached after first fetch

async function initSchedCalendar() {
    edAvailDates = {};
    if (db) {
        try {
            const snap = await db.ref('dailyBoardDates').once('value');
            edAvailDates = snap.val() || {};
        } catch {}
    }
    renderSchedCalendar();
    _updateSelectedDateLabel();
}

function renderSchedCalendar() {
    const container = document.getElementById('sched-calendar');
    const labelEl   = document.getElementById('cal-month-label');
    const d = new Date(edCalendarYear, edCalendarMonth, 1);
    if (labelEl) labelEl.textContent = d.toLocaleString('default', { month: 'long', year: 'numeric' });
    container.innerHTML = '';

    const todayStr = new Date().toISOString().slice(0, 10);
    const daysInMonth = new Date(edCalendarYear, edCalendarMonth + 1, 0).getDate();

    const dayHdr = document.createElement('div');
    dayHdr.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px';
    ['S','M','T','W','T','F','S'].forEach(ch => {
        const h = document.createElement('div');
        h.style.cssText = 'text-align:center;font-size:0.6rem;font-weight:700;color:var(--text-muted)';
        h.textContent = ch;
        dayHdr.appendChild(h);
    });
    container.appendChild(dayHdr);

    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:2px';
    const firstDOW = new Date(edCalendarYear, edCalendarMonth, 1).getDay();
    for (let i = 0; i < firstDOW; i++) grid.appendChild(document.createElement('div'));

    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${edCalendarYear}-${String(edCalendarMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const hasBoard  = !!(edAvailDates && edAvailDates[dateStr]);
        const isToday   = dateStr === todayStr;
        const isSelected = dateStr === edSelectedDate;

        const cell = document.createElement('div');
        cell.style.cssText = 'text-align:center;border-radius:6px;padding:4px 2px;font-size:0.78rem;font-weight:600;min-height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;';
        cell.textContent = day;

        if (isSelected) {
            cell.style.background = 'var(--primary)';
            cell.style.color = '#fff';
        } else if (hasBoard) {
            cell.style.background = 'var(--cell-active)';
            cell.style.color = 'var(--primary)';
        } else {
            cell.style.color = 'var(--text-muted)';
        }
        if (isToday && !isSelected) cell.style.outline = `2px solid ${hasBoard ? 'var(--primary)' : 'var(--text-muted)'}`;

        cell.onclick = () => selectCalendarDay(dateStr, hasBoard);
        grid.appendChild(cell);
    }
    container.appendChild(grid);
}

function calPrevMonth() {
    edCalendarMonth--;
    if (edCalendarMonth < 0) { edCalendarMonth = 11; edCalendarYear--; }
    renderSchedCalendar();
}
function calNextMonth() {
    edCalendarMonth++;
    if (edCalendarMonth > 11) { edCalendarMonth = 0; edCalendarYear++; }
    renderSchedCalendar();
}

function _updateSelectedDateLabel() {
    const el = document.getElementById('cal-selected-date');
    if (!el) return;
    const d = new Date(edSelectedDate + 'T00:00:00');
    el.textContent = d.toLocaleDateString('default', { month: 'long', day: 'numeric', year: 'numeric' });
}

async function selectCalendarDay(dateStr, hasBoard) {
    edSelectedDate = dateStr;
    _updateSelectedDateLabel();
    if (hasBoard) {
        await _loadDailyBoardIntoEditor(dateStr);
    } else {
        editorRows = 3; editorCols = 3;
        buildEditorTable(false, null);
        scheduleWordCount();
        showStatus(`New board for ${dateStr} — add letters and Save Board.`, 'info');
        renderSchedCalendar();
    }
}

async function _loadDailyBoardIntoEditor(dateStr) {
    if (!db) return;
    showStatus('Loading…', 'info');
    try {
        const snap = await db.ref(`dailyBoards/${dateStr}`).once('value');
        const cfg = snap.val();
        if (!cfg) { showStatus(`No board found for ${dateStr}.`, 'err'); return; }
        editorRows = cfg.rows; editorCols = cfg.cols;
        buildEditorTable(false, cfg.cells);
        scheduleWordCount();
        showStatus(`Loaded ${dateStr}. Edit and Save Board to update it.`, 'ok');
        renderSchedCalendar();
    } catch(e) {
        showStatus(`Load failed: ${e.message}`, 'err');
    }
}

// ── Save Board to Firebase ─────────────────────────────────────────────────

async function saveBoard() {
    const { cells, hasAny } = readCells();
    if (!hasAny) { showStatus('Please enter at least one letter.', 'err'); return; }
    if (!isConnected(cells, editorRows, editorCols)) {
        showStatus('Letters are not all connected — every cell must touch at least one other.', 'err');
        return;
    }
    if (!db) { showStatus('Firebase not connected.', 'err'); return; }
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    showStatus('Saving…', 'info');
    try {
        const payload = { rows: editorRows, cols: editorCols, cells };
        const activeWords = _edCurrentWords.filter(w => !edWordSelections.has(w));
        if (activeWords.length) payload.words = activeWords;
        await db.ref(`dailyBoards/${edSelectedDate}`).set(payload);
        await db.ref(`dailyBoardDates/${edSelectedDate}`).set(true);
        if (edAvailDates) edAvailDates[edSelectedDate] = true; // update local cache
        const today = new Date().toISOString().slice(0, 10);
        if (edSelectedDate === today) await db.ref('boardConfig').set(payload);
        showStatus(`Saved for ${edSelectedDate}!`, 'ok');
        renderSchedCalendar();
    } catch(e) {
        showStatus(`Save failed: ${e.message}`, 'err');
    }
    btn.disabled = false;
}

function testBoard() {
    const { cells, hasAny } = readCells();
    if (hasAny && !isConnected(cells, editorRows, editorCols)) {
        showStatus('Letters are not all connected.', 'err'); return;
    }
    localStorage.setItem('G2_test_board', JSON.stringify({ rows: editorRows, cols: editorCols, cells }));
    localStorage.setItem('G2_test_word_sel', JSON.stringify([...edWordSelections]));
    window.open('./test.html', '_blank');
}

// ── Editor Table ───────────────────────────────────────────────────────────
function buildEditorTable(keepExisting, prefill) {
    document.getElementById('ed-rows').textContent = editorRows;
    document.getElementById('ed-cols').textContent = editorCols;

    const table = document.getElementById('editor-table');
    const prev = {};
    if (keepExisting) {
        table.querySelectorAll('input').forEach(inp =>
            prev[`${inp.dataset.r},${inp.dataset.c}`] = inp.value);
    }
    table.innerHTML = '';

    for (let r = 0; r < editorRows; r++) {
        const tr = document.createElement('tr');
        for (let c = 0; c < editorCols; c++) {
            const td = document.createElement('td');
            const inp = document.createElement('input');
            inp.type = 'text'; inp.maxLength = 1;
            inp.dataset.r = r; inp.dataset.c = c;
            inp.autocomplete = 'off'; inp.spellcheck = false;

            if (keepExisting && prev[`${r},${c}`] !== undefined) {
                inp.value = prev[`${r},${c}`];
            } else if (prefill && prefill[r]?.[c]) {
                inp.value = prefill[r][c];
            }

            inp.addEventListener('input', () => {
                // handles paste — clamp to one uppercase letter
                inp.value = inp.value.slice(-1).toUpperCase();
                clearStatus();
                scheduleWordCount();
            });
            inp.addEventListener('keydown', ev => {
                if (/^[a-zA-Z]$/.test(ev.key)) {
                    ev.preventDefault();
                    inp.value = ev.key.toUpperCase();
                    clearStatus();
                    scheduleWordCount();
                    const next = table.querySelector(`input[data-r="${r}"][data-c="${c+1}"]`)
                              || table.querySelector(`input[data-r="${r+1}"][data-c="0"]`);
                    next?.focus();
                } else if (ev.key === ' ') {
                    ev.preventDefault();
                    inp.value = '';
                    clearStatus();
                    scheduleWordCount();
                } else if (ev.key === 'Backspace' && !inp.value) {
                    const p = table.querySelector(`input[data-r="${r}"][data-c="${c-1}"]`)
                            || table.querySelector(`input[data-r="${r-1}"][data-c="${editorCols-1}"]`);
                    p?.focus();
                }
            });

            td.appendChild(inp);
            tr.appendChild(td);
        }
        table.appendChild(tr);
    }
}

function adjustDim(dim, delta) {
    if (dim === 'rows') editorRows = Math.max(1, Math.min(10, editorRows + delta));
    else                editorCols = Math.max(1, Math.min(10, editorCols + delta));
    buildEditorTable(true, null);
    scheduleWordCount();
}

function clearAll() {
    document.getElementById('editor-table').querySelectorAll('input')
        .forEach(inp => inp.value = '');
    clearStatus();
    scheduleWordCount();
}

function readCells() {
    const table = document.getElementById('editor-table');
    const cells = [];
    let hasAny = false;
    for (let r = 0; r < editorRows; r++) {
        cells[r] = [];
        for (let c = 0; c < editorCols; c++) {
            const inp = table.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
            const v = inp ? inp.value.trim().toUpperCase() : '';
            cells[r][c] = /^[A-Z]$/.test(v) ? v : null;
            if (cells[r][c]) hasAny = true;
        }
    }
    return { cells, hasAny };
}

function isConnected(cells, rows, cols) {
    const lc = [];
    for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
            if (cells[r]?.[c]) lc.push([r, c]);
    if (lc.length <= 1) return lc.length === 1;
    const visited = new Set();
    const key = (r, c) => `${r},${c}`;
    const queue = [lc[0]];
    visited.add(key(...lc[0]));
    while (queue.length) {
        const [r, c] = queue.shift();
        for (let dr = -1; dr <= 1; dr++)
            for (let dc = -1; dc <= 1; dc++) {
                if (!dr && !dc) continue;
                const nr = r+dr, nc = c+dc;
                if (nr<0||nr>=rows||nc<0||nc>=cols||!cells[nr]?.[nc]) continue;
                const k = key(nr, nc);
                if (!visited.has(k)) { visited.add(k); queue.push([nr, nc]); }
            }
    }
    return visited.size === lc.length;
}

function edCanSpell(word, cells, rows, cols) {
    function dfs(idx, r, c) {
        if (!cells[r]?.[c] || cells[r][c] !== word[idx]) return false;
        if (idx === word.length-1) return true;
        for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++)
            if ((dr||dc) && r+dr>=0 && r+dr<rows && c+dc>=0 && c+dc<cols && dfs(idx+1,r+dr,c+dc)) return true;
        return false;
    }
    for (let r=0;r<rows;r++) for (let c=0;c<cols;c++)
        if (cells[r]?.[c] === word[0] && dfs(0,r,c)) return true;
    return false;
}

    if (!hasAny || !isConnected(cells, editorRows, editorCols)) { el.textContent = '—'; _edCurrentWords = []; renderWordList(); return; }
    const ls = new Set();
    for (let r=0;r<editorRows;r++) for (let c=0;c<editorCols;c++) if (cells[r]?.[c]) ls.add(cells[r][c]);
    const words = [];
    for (const word of edDict) {

        for (const ch of word) if (!ls.has(ch)) { ok=false; break; }

    _edCurrentWords = words;

// ── Procedural board generator (Phases 1-4, no dictionary required) ─────────
function _edGaussian(mu, sigma) {
    const u1 = Math.random() || 1e-10, u2 = Math.random();
    return Math.min(25, Math.max(6, Math.round(mu + sigma * Math.sqrt(-2*Math.log(u1)) * Math.cos(2*Math.PI*u2))));
}

function _edGrowShape(target) {
    const S = 5;
    const adj4 = id => { const r=id/S|0,c=id%S,a=[]; if(r>0)a.push(id-S); if(r<S-1)a.push(id+S); if(c>0)a.push(id-1); if(c<S-1)a.push(id+1); return a; };
    const adj8 = id => { const r=id/S|0,c=id%S,a=[]; for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<S&&nc>=0&&nc<S)a.push(nr*S+nc);}return a; };
    const occupied=new Set(), fSet=new Set(), fArr=[];
    const start=Math.random()*25|0; occupied.add(start);
    for(const nb of adj4(start)){fSet.add(nb);fArr.push(nb);}
    while(occupied.size<target&&fArr.length>0){
        const i=Math.random()*fArr.length|0, cell=fArr[i]; fArr.splice(i,1); fSet.delete(cell);
        occupied.add(cell);
        for(const nb of adj4(cell)) if(!occupied.has(nb)&&!fSet.has(nb)){fSet.add(nb);fArr.push(nb);}
    }
    const nodes=[], idxOf=new Map();
    for(const id of occupied){idxOf.set(id,nodes.length);nodes.push({id,coord:{r:id/S|0,c:id%S},letter:'',isQU:false,neighbors:[]});}
    for(const node of nodes) for(const nid of adj8(node.id)) if(occupied.has(nid)) node.neighbors.push(idxOf.get(nid));
    return nodes;
}

function _edTopologyOk(graph) {
    const n=graph.length;
    if(graph.filter(nd=>nd.neighbors.length<=2).length/n>=0.85) return false;
    if(n>=6&&n<=8&&!graph.some(nd=>nd.neighbors.length>=3)) return false;
    return true;
}

function _edAssignLetters(graph) {
    const VP='E'.repeat(13)+'A'.repeat(9)+'I'.repeat(9)+'O'.repeat(7)+'U'.repeat(3)+'Y'.repeat(3);
    // No Q/X/Z in editor pool — no dictionary validation available to guarantee usability
    const CP='S'.repeat(10)+'T'.repeat(10)+'R'.repeat(10)+'N'.repeat(10)+'L'.repeat(10)+'D'.repeat(10)+'C'.repeat(6)+'M'.repeat(6)+'P'.repeat(6)+'G'.repeat(5)+'B'.repeat(4)+'H'.repeat(3)+'F'.repeat(3)+'W'.repeat(3)+'KK'+'VV'+'J';
    const n=graph.length, vCount=Math.round(n*0.38);
    const maxRep=Math.max(1,Math.ceil(n/8));
    const counts={};
    const draw=pool=>{
        for(let t=0;t<40;t++){const ch=pool[Math.random()*pool.length|0];if((counts[ch]||0)<maxRep){counts[ch]=(counts[ch]||0)+1;return ch;}}
        return pool[Math.random()*pool.length|0];
    };
    const idxs=Array.from({length:n},(_,i)=>i);
    for(let i=n-1;i>0;i--){const j=Math.random()*i|0;[idxs[i],idxs[j]]=[idxs[j],idxs[i]];}
    const vowelSet=new Set(idxs.slice(0,vCount));
    for(let i=0;i<n;i++) graph[i].letter=vowelSet.has(i)?draw(VP):draw(CP);
    const friendly=new Set('STNRLDCGMPWBFH');
    for(const node of graph)
        if(node.neighbors.length===1&&!'AEIOU'.includes(node.letter)&&!friendly.has(node.letter))
            node.letter=VP[Math.random()*VP.length|0];
    for(const node of graph){
        if(node.letter!=='J') continue;
        if(node.neighbors.length>0&&!node.neighbors.some(ni=>'AEIOU'.includes(graph[ni].letter)))
            graph[node.neighbors[Math.random()*node.neighbors.length|0]].letter=VP[Math.random()*VP.length|0];
    }
}

let _edTrie = null;
function _edGetTrie() {
    if (_edTrie) return _edTrie;
    if (!edDict) return null;
    const root = {};
    for (const word of edDict) {
        let node = root;
        for (const ch of word) { node[ch] = node[ch] || {}; node = node[ch]; }
        node.$ = true;
    }
    return _edTrie = root;
}
function _edFindCovered(graph, trie) {
    const n=graph.length, covered=new Set();
    function dfs(ni, trNode, depth, vis){
        if(vis.has(ni)) return;
        const next=trNode[graph[ni].letter];
        if(!next) return;
        vis.add(ni);
        if(depth>=4&&next.$) for(const idx of vis) covered.add(idx);
        if(depth<18&&covered.size<n) for(const nni of graph[ni].neighbors) dfs(nni,next,depth+1,vis);
        vis.delete(ni);
    }
    for(let i=0;i<n&&covered.size<n;i++) dfs(i,trie,1,new Set());
    return covered;
}
function _edCanCoverNode(nodeIdx, graph, trie) {
    function dfs(ni, trNode, depth, vis){
        if(vis.has(ni)) return false;
        const next=trNode[graph[ni].letter];
        if(!next) return false;
        vis.add(ni);
        if(depth>=4&&next.$&&vis.has(nodeIdx)){vis.delete(ni);return true;}
        if(depth<18) for(const nni of graph[ni].neighbors) if(dfs(nni,next,depth+1,vis)){vis.delete(ni);return true;}
        vis.delete(ni); return false;
    }
    for(let i=0;i<graph.length;i++) if(dfs(i,trie,1,new Set())) return true;
    return false;
}
function _edValidateRepair(graph, trie) {
    if(!trie) return true;
    const allLetters='EAIOSTRNDLCUMPGHBYWFKVJQ'.split('');
    for(let iter=0;iter<80;iter++){
        const covered=_edFindCovered(graph,trie);
        if(covered.size===graph.length) return true;
        let changed=false;
        for(let i=0;i<graph.length;i++){
            if(covered.has(i)) continue;
            const node=graph[i];
            const orig=node.letter;
            let fixed=false;
            const repairs=[...allLetters].sort(()=>Math.random()-0.5);
            for(const rep of repairs){
                if(rep===orig) continue;
                node.letter=rep;
                if(_edCanCoverNode(i,graph,trie)){fixed=true;changed=true;break;}
                node.letter=orig;
            }
            if(!fixed) node.letter=orig;
        }
        if(!changed) return false;
    }
    return _edFindCovered(graph,trie).size===graph.length;
}

function _edToBoard(graph) {
    let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
    for(const nd of graph){if(nd.coord.r<minR)minR=nd.coord.r;if(nd.coord.r>maxR)maxR=nd.coord.r;if(nd.coord.c<minC)minC=nd.coord.c;if(nd.coord.c>maxC)maxC=nd.coord.c;}
    const rows=maxR-minR+1,cols=maxC-minC+1;
    const lookup=new Map(graph.map(nd=>[(nd.coord.r-minR)*cols+(nd.coord.c-minC),nd.letter]));
    const cells=Array.from({length:rows},(_,r)=>Array.from({length:cols},(_,c)=>{const k=r*cols+c;return lookup.has(k)?lookup.get(k):null;}));
    return{rows,cols,cells};
}

// ── Fill Random: morpheme-seeded fill of the current ROW×COL grid ──────────
function _edBuildRectGraph(rows, cols) {
    const nodes=[], idxOf=new Map();
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
        idxOf.set(r*cols+c, nodes.length);
        nodes.push({coord:{r,c}, letter:'', neighbors:[]});
    }
    for(const node of nodes){
        const{r,c}=node.coord;
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
            if(!dr&&!dc) continue;
            const nr=r+dr,nc=c+dc;
            if(nr>=0&&nr<rows&&nc>=0&&nc<cols) node.neighbors.push(idxOf.get(nr*cols+nc));
        }
    }
    return nodes;
}

function _edFindPaths(graph, k, excluded) {
    const paths=[], MAX=200;
    function dfs(path, vis){
        if(paths.length>=MAX) return;
        if(path.length===k){paths.push({nodes:[...path],score:path.reduce((s,i)=>s+graph[i].neighbors.length,0)});return;}
        for(const ni of graph[path[path.length-1]].neighbors){
            if(!vis.has(ni)&&!excluded.has(ni)){
                vis.add(ni);path.push(ni);dfs(path,vis);path.pop();vis.delete(ni);
                if(paths.length>=MAX) return;
            }
        }
    }
    for(let i=0;i<graph.length&&paths.length<MAX;i++) if(!excluded.has(i)) dfs([i],new Set([i]));
    paths.sort((a,b)=>b.score-a.score);
    return paths;
}

function _edWeightedPick(arr){
    let r=Math.random()*arr.reduce((s,[,w])=>s+w,0);
    for(const[v,w]of arr){r-=w;if(r<=0)return v;}
    return arr[arr.length-1][0];
}

const _ED_SUFFIXES=[['ING',40],['ION',20],['EST',15],['ER',12],['ED',8],['LY',8],
    ['TION',6],['NESS',6],['MENT',5],['ABLE',4],['OUS',3],['LESS',3]];
const _ED_PREFIXES=[['RE',25],['UN',18],['CON',12],['PRE',10],['OUT',8]];

function _edSeedAndFill(graph) {
    const locked=new Set(), n=graph.length;
    const isV=c=>'AEIOU'.includes(c);

    // Suffix seed — first morpheme letter gets cell with most external neighbors
    const sfx=_ED_SUFFIXES.filter(([s])=>s.length<=n-locked.size-3);
    if(sfx.length){
        const m=_edWeightedPick(sfx);
        const paths=_edFindPaths(graph,m.length,locked);
        if(paths.length){
            const pick=paths[Math.random()*Math.min(4,paths.length)|0].nodes;
            const pset=new Set(pick);
            const ext=i=>graph[i].neighbors.filter(ni=>!pset.has(ni)).length;
            const rev=[...pick].reverse();
            const ord=ext(rev[0])>ext(pick[0])?rev:pick;
            for(let j=0;j<m.length;j++){graph[ord[j]].letter=m[j];locked.add(ord[j]);}
        }
    }

    // Prefix seed on larger boards
    if(n>=14&&n-locked.size>=8){
        const pfx=_ED_PREFIXES.filter(([p])=>p.length<=n-locked.size-4);
        if(pfx.length){
            const m=_edWeightedPick(pfx);
            const paths=_edFindPaths(graph,m.length,locked);
            if(paths.length){
                const pick=paths[Math.random()*Math.min(4,paths.length)|0].nodes;
                const pset=new Set(pick);
                const ext=i=>graph[i].neighbors.filter(ni=>!pset.has(ni)).length;
                const rev=[...pick].reverse(), k=m.length-1;
                const ord=ext(rev[k])>ext(pick[k])?rev:pick;
                for(let j=0;j<m.length;j++){graph[ord[j]].letter=m[j];locked.add(ord[j]);}
            }
        }
    }

    // Topology-aware fill: hubs get high-freq consonants, leaves get word-ending letters
    const VP='EEEEEEEEEEEEAAAAAAAIIIIIIIOOOOOOUUUYYY';
    const HD='SSSSSTTTTTRRRRRNNNNNDDDDDLLLLLCCCCMMMPPP';
    const MD='SSTTRRNNDLCMBPGWF';
    const LF='SSSSDDRRYNNTLL';
    const unlocked=[];
    for(let i=0;i<n;i++) if(!locked.has(i)) unlocked.push(i);
    unlocked.sort((a,b)=>graph[b].neighbors.length-graph[a].neighbors.length);
    const maxRep=Math.max(1,Math.ceil(n/7));
    const counts={};
    for(const i of locked){const ch=graph[i].letter;counts[ch]=(counts[ch]||0)+1;}
    const draw=pool=>{
        for(let t=0;t<50;t++){const ch=pool[Math.random()*pool.length|0];if((counts[ch]||0)<maxRep){counts[ch]=(counts[ch]||0)+1;return ch;}}
        return pool[Math.random()*pool.length|0];
    };
    let vCount=[...locked].filter(i=>isV(graph[i].letter)).length;
    const targetV=Math.round(n*0.40), topN=Math.ceil(unlocked.length*0.35);
    for(let rank=0;rank<unlocked.length;rank++){
        const i=unlocked[rank], deg=graph[i].neighbors.length;
        const clusterC=graph[i].neighbors.filter(ni=>locked.has(ni)).every(ni=>!isV(graph[ni].letter));
        const wantV=vCount<targetV&&(clusterC||Math.random()<0.42);
        let letter;
        if(wantV){letter=draw(VP);if(isV(letter))vCount++;}
        else if(deg===1){letter=draw(LF);}
        else if(rank<topN){letter=draw(HD);}
        else{letter=draw(MD);}
        graph[i].letter=letter; locked.add(i);
    }
    // Vowel coverage: every consonant gets at least one adjacent vowel
    for(let i=0;i<n;i++){
        if(isV(graph[i].letter)) continue;
        if(graph[i].neighbors.some(ni=>isV(graph[ni].letter))) continue;
        if(!graph[i].neighbors.length) continue;
        const cands=graph[i].neighbors.slice().sort((a,b)=>graph[a].neighbors.length-graph[b].neighbors.length);
        if(cands.length) graph[cands[0]].letter='EAIO'[Math.random()*4|0];
    }
}

function _edAllTilesUsed(cells, rows, cols) {
    if(!edDict) return true;
    const ls=new Set();
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(cells[r]?.[c]) ls.add(cells[r][c]);
    let total=0; for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(cells[r]?.[c]) total++;
    const used=new Set();
    function spell(word,idx,r,c,path){
        if(idx===word.length){for(const k of path) used.add(k);return;}
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
            if(!dr&&!dc) continue;
            const nr=r+dr,nc=c+dc;
            if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&cells[nr]?.[nc]===word[idx]){
                path.push(nr*cols+nc);spell(word,idx+1,nr,nc,path);path.pop();
            }
        }
    }
    for(const word of edDict){
        if(used.size>=total) break;
        let ok=true; for(const ch of word) if(!ls.has(ch)){ok=false;break;}
        if(!ok) continue;
        for(let r=0;r<rows&&used.size<total;r++) for(let c=0;c<cols&&used.size<total;c++)
            if(cells[r]?.[c]===word[0]) spell(word,1,r,c,[r*cols+c]);
    }
    return used.size>=total;
}

function fillRandom() {
    const trie=_edGetTrie();
    for(let attempt=0; attempt<50; attempt++){
        const graph=_edBuildRectGraph(editorRows, editorCols);
        _edSeedAndFill(graph);
        if(trie) _edValidateRepair(graph, trie);
        const cells=Array.from({length:editorRows},(_,r)=>Array.from({length:editorCols},(_,c)=>graph[r*editorCols+c].letter));
        if(edDict && attempt<49 && !_edAllTilesUsed(cells, editorRows, editorCols)) continue;
        const inputs=document.getElementById('editor-table').querySelectorAll('input');
        for(let r=0;r<editorRows;r++) for(let c=0;c<editorCols;c++){
            const inp=inputs[r*editorCols+c]; if(inp) inp.value=cells[r][c];
        }
        clearStatus(); scheduleWordCount(); return;
    }
}

function generateRandom() {
    const trie=_edGetTrie();
    for(let attempt=0; attempt<200; attempt++){
        const graph=_edGrowShape(_edGaussian(9,3));
        if(!_edTopologyOk(graph)) continue;
        _edAssignLetters(graph);
        if(trie && !_edValidateRepair(graph, trie)) continue;
        const board=_edToBoard(graph);
        if(edDict && !_edAllTilesUsed(board.cells, board.rows, board.cols)) continue;
        editorRows=board.rows; editorCols=board.cols;
        buildEditorTable(false, board.cells);
        clearStatus(); scheduleWordCount(); return;
    }
}
</script>
