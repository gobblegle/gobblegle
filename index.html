    document.getElementById('room-menu').style.display = 'none';
    createRoom();
}

function showJoinInput() {
    document.getElementById('join-code-row').style.display = '';
    document.getElementById('join-code-input').focus();
}

async function joinRoomByCode() {
    const code = document.getElementById('join-code-input').value.trim().toUpperCase();
    if (!code) return;
    if (!db) {
        alert('Rooms need Firebase.\n\nCreate a free project at firebase.google.com, enable Realtime Database, then paste the config into index.html where it says REPLACE_ME.');
        return;
    }
    document.getElementById('room-menu').style.display = 'none';
    history.pushState({}, '', `?room=${code}`);
    await initRoomMode(code);
}

async function createRoom() {
    if (!db) {
        alert('Rooms need Firebase.\n\nCreate a free project at firebase.google.com, enable Realtime Database, then paste the config into index.html where it says REPLACE_ME.');
        return;
    }
    playerId  = getPlayerId();
    roomId    = generateRoomId();
    roomRef   = db.ref(`rooms/${roomId}`);
    await roomRef.set({ created: Date.now(), state: 'lobby', settings: { rows: 4, cols: 4, minutes: 3 }, currentRound: -1 });
    history.pushState({}, '', `?room=${roomId}`);
    await initRoomMode(roomId);
}

async function initRoomMode(rid) {
    roomMode  = true;
    roomId    = rid;
    playerId  = getPlayerId();
    roomRef   = db.ref(`rooms/${rid}`);

    const snap = await roomRef.once('value');
    if (!snap.exists()) {
        alert('Room not found.');
        history.replaceState({}, '', location.pathname);
        location.reload();
        return;
    }

    document.getElementById('game-container').style.display = 'none';
    document.getElementById('start-room-btn').style.display = 'none';
    document.getElementById('room-overlay').classList.add('visible');

    const savedName = localStorage.getItem('gob_name') || '';
    if (savedName && savedName !== 'undefined') document.getElementById('player-name-input').value = savedName;

    // Returning player: restore online status before listener fires
    const roomData = snap.val();
    const existingPlayer = roomData?.players?.[playerId];
    const hasValidName = existingPlayer?.name && existingPlayer.name !== 'undefined';
    if (existingPlayer && existingPlayer.online === false && hasValidName) {
        // Restore Firebase name to input and localStorage in case localStorage drifted
        document.getElementById('player-name-input').value = existingPlayer.name;
        localStorage.setItem('gob_name', existingPlayer.name);
        await roomRef.child(`players/${playerId}`).update({ online: true, ready: false });
        roomRef.child(`players/${playerId}/online`).onDisconnect().set(false);
    }

    roomRef.on('value', snap => handleRoomUpdate(snap.val()));

    document.addEventListener('click', e => {
        const popup=document.getElementById('word-popup');
        if(popup.style.display!=='none'&&!popup.contains(e.target)&&e.target!==document.getElementById('score-btn'))
            popup.style.display='none';
    });
}

function handleRoomUpdate(data) {
    if (!data) { alert('This room has been closed.'); leaveRoom(); return; }
    if (data.state === 'lobby') {
        roomPlayingInitialized = false;
        scoreBoardShown = false;
        showPanel('lobby');
        renderLobby(data);
        checkAutoStart(data);
    } else if (data.state === 'playing') {
        if (data.currentRound !== roomCurrentRound) {
            roomPlayingInitialized = false;
            scoreBoardShown = false;
        }
        // Late joiner: not in player list yet — show lobby for name entry
        if (!data.players?.[playerId]) {
            showPanel('lobby');
            renderLobby(data);
            return;
        }
        if (!roomPlayingInitialized && data.currentRound > roomLastPlayedRound) renderRoomPlaying(data);
    } else if (data.state === 'finished') {
        const myPlayer = data.players?.[playerId];
        const didPlayRound = myPlayer?.rounds?.[data.currentRound ?? 0] != null;
        if (!didPlayRound || myPlayer?.closedScoreboard) {
            showPanel('lobby');
            renderLobby(data);
            checkAutoStart(data);
        } else {
            renderScoreboard(data);
        }
    }
}

function checkAutoStart(data) {
    const players = data.players || {};
    const arr = Object.entries(players)
        .filter(([,p]) => p.online !== false)
        .sort((a,b) => (a[1].joined||0)-(b[1].joined||0));
    if (arr.length > 0 && arr.every(([,p]) => p.ready) && arr[0][0] === playerId) {
        autoStartGame(data);
    }
}

// ── Lobby ──────────────────────────────────────────────────────────────────
function renderLobby(data) {
    document.getElementById('lobby-code').textContent = roomId;

    const players = data.players || {};
    const myPlayer = players[playerId];
    const hasJoined = !!myPlayer && myPlayer.online !== false;
    const myReady   = myPlayer?.ready || false;

    document.getElementById('name-entry-card').style.display = hasJoined ? 'none' : '';

    const readyBtn = document.getElementById('ready-btn');
    readyBtn.disabled = !hasJoined;
    readyBtn.textContent = myReady ? 'Ready ✓' : "I'm Ready";
    readyBtn.className = 'btn btn-full' + (myReady ? ' btn-green' : '');

    // Only show online players
    const onlinePlayers = Object.entries(players).filter(([,p]) => p.online !== false);
    // Host = earliest joined among online
    const hostId = onlinePlayers.slice().sort((a,b) => (a[1].joined||0)-(b[1].joined||0))[0]?.[0];
    // Display order: most game points first, then join order
    const displayArr = onlinePlayers.slice().sort((a,b) =>
        (b[1].gamePoints||0)-(a[1].gamePoints||0) || (a[1].joined||0)-(b[1].joined||0));

    const pl = document.getElementById('player-list');
    pl.innerHTML = '';
    if (!displayArr.length) {
        pl.innerHTML = '<div class="hint">No players yet…</div>';
    } else {
        displayArr.forEach(([pid,p]) => {
            const el=document.createElement('div');
            el.className='player-item'+(pid===playerId?' me':'');
            const hostTag = pid===hostId ? ' <span style="font-size:.75rem;color:var(--text-muted);font-weight:400">(host)</span>' : '';
            const pts = p.gamePoints || 0;
            const scoreTag = `<span style="font-size:.78rem;color:var(--text-muted);margin-left:4px">${pts} pt${pts!==1?'s':''}</span>`;
            const badge = `<span class="ready-badge ${p.ready?'yes':'no'}">${p.ready?'Ready':'Waiting'}</span>`;
            el.innerHTML=`<span class="player-dot"></span>${p.name||'?'}${hostTag}${scoreTag}${badge}`;
            pl.appendChild(el);
        });
    }

    const s = data.settings || {rows:4,cols:4,minutes:3};
    const rows = s.rows || s.size || 4;
    const cols = s.cols || s.size || 4;
    const isRandom = s.mode === 'random';
    const isCustom = !isRandom && (s.custom === true || !([3,4,5].includes(rows) && rows === cols));
    document.querySelectorAll('.size-tab').forEach(btn => {
        const br=parseInt(btn.dataset.r), bc=parseInt(btn.dataset.c);
        if (br===-1) { btn.classList.toggle('active', isRandom); return; }
        btn.classList.toggle('active', br===0 ? isCustom : !isRandom && br===rows && bc===cols);
    });
    document.getElementById('custom-size-row').style.display = isCustom ? '' : 'none';
    if (isCustom) { document.getElementById('custom-rows').value=rows; document.getElementById('custom-cols').value=cols; }
    initMinutesPicker(s.minutes || 3);
}

async function joinLobby() {
    const inp  = document.getElementById('player-name-input');
    const name = inp.value.trim();
    if (!name || name === 'undefined') { inp.value = ''; inp.focus(); return; }
    localStorage.setItem('gob_name', name);
    const snap = await roomRef.child(`players/${playerId}`).once('value');
    const existing = snap.val();
    if (existing) {
        await roomRef.child(`players/${playerId}`).update({ name, online: true, ready: false });
    } else {
        await roomRef.child(`players/${playerId}`).set({ name, gamePoints: 0, joined: Date.now(), online: true, ready: false });
    }
    roomRef.child(`players/${playerId}/online`).onDisconnect().set(false);
    document.getElementById('name-entry-card').style.display = 'none';
}

async function toggleReady() {
    const snap = await roomRef.child(`players/${playerId}`).once('value');
    const p = snap.val();
    if (!p) return;
    await roomRef.child(`players/${playerId}/ready`).set(!p.ready);
}

async function setRoomSetting(field, val) {
    await roomRef.child(`settings/${field}`).set(val);
}

async function setRoomSize(rows, cols) {
    await roomRef.child('settings').update({ rows, cols, custom: false, mode: 'shaped' });
}

function setRoomSizeCustom() {
    document.getElementById('custom-size-row').style.display = '';
    document.querySelectorAll('.size-tab').forEach(btn=>btn.classList.toggle('active', btn.dataset.r==='0'));
    applyCustomSize();
}

function applyCustomSize() {
    const r = parseInt(document.getElementById('custom-rows').value) || 5;
    const c = parseInt(document.getElementById('custom-cols').value) || 5;
    roomRef.child('settings').update({ rows: r, cols: c, custom: true, mode: 'shaped' });
}

function setRoomSizeRandom() {
    document.getElementById('custom-size-row').style.display = 'none';
    roomRef.child('settings').update({ rows: 5, cols: 5, custom: false, mode: 'random' });
}

function initMinutesPicker(initialValue) {
    const scroller = document.getElementById('minutes-picker');
    if (!scroller._built) {
        scroller._built = true;
        const pad1=document.createElement('div'); pad1.className='picker-pad'; scroller.appendChild(pad1);
        for (let i=1;i<=99;i++) {
            const item=document.createElement('div'); item.className='picker-item';
            item.textContent=`${i} min`; item.dataset.value=i; scroller.appendChild(item);
        }
        const pad2=document.createElement('div'); pad2.className='picker-pad'; scroller.appendChild(pad2);
        let t;
        scroller.addEventListener('scroll', () => {
            clearTimeout(t);
            t = setTimeout(() => {
                const val=Math.min(99,Math.max(1,Math.round(scroller.scrollTop/40)+1));
                setRoomSetting('minutes', val);
            }, 150);
        }, {passive:true});
        scroller.addEventListener('wheel', e => {
            e.preventDefault();
            scroller.scrollBy({ top: e.deltaY > 0 ? 40 : -40, behavior: 'smooth' });
        }, {passive:false});
    }
    requestAnimationFrame(() => { scroller.scrollTop = (initialValue-1)*40; });
}

// ── Game start ─────────────────────────────────────────────────────────────
async function autoStartGame(data) {
    roomRef.child('state').transaction(
        cur => (cur === 'lobby' || cur === 'finished') ? 'playing' : undefined,
        async (err, committed) => {
            if (!committed) return;
            const snap = await roomRef.once('value');
            const d = snap.val();
            const s = d.settings || {rows:4,cols:4,minutes:3};
            const rows = s.rows || s.size || 4;
            const cols = s.cols || s.size || 4;
            const nextRound = (d.currentRound ?? -1) + 1;
            const board = s.mode === 'random' ? generateProceduralBoard(20) : generateShapedBoard(rows, cols);
            const updates = { board, startedAt: Date.now(), currentRound: nextRound };
            for (const pid of Object.keys(d.players || {})) {
                updates[`players/${pid}/closedScoreboard`] = false;
                updates[`players/${pid}/ready`] = false;
            }
            await roomRef.update(updates);
        }
    );
}

function renderRoomPlaying(data) {
    if (roomPlayingInitialized) return;
    if (!data.board) return;
    // Ignore stale intermediate Firebase events where the round has already expired
    const durationMs = (data.settings?.minutes || 3) * 60000;
    if (data.startedAt && (data.startedAt + durationMs) < Date.now()) return;
    roomPlayingInitialized = true;

    showPanel('game');

    boardRows = data.board.rows; boardCols = data.board.cols; boardCells = data.board.cells;
    roomFoundWords   = new Set();
    roomScoreSubmitted = false;
    roomCurrentRound   = data.currentRound ?? 0;

    document.getElementById('score-btn').textContent = 'Calculating…';
    document.getElementById('room-score-display').textContent = 'Score: 0';
    document.getElementById('timer-display').textContent = '--:--';
    document.getElementById('timer-display').classList.remove('urgent');
    document.getElementById('room-code-label').textContent = `Room: ${roomId}`;

    renderBoard();
    clearPathUI();

    setTimeout(() => {
        calculateValidWords();
        updateTileHints();
        updateRoomScoreUI();
        startRoomCountdown(data.startedAt + (data.settings?.minutes || 3) * 60000);
    }, 50);
}

function startRoomCountdown(endAt) {
    const el = document.getElementById('timer-display');
    function tick() {
        const rem = Math.max(0, endAt - Date.now());
        const s   = Math.ceil(rem / 1000);
        el.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        el.classList.toggle('urgent', rem > 0 && rem <= 30000);
        if (rem <= 0) { clearInterval(roomCountdownInterval); roomCountdownInterval = null; endRoomGame(); }
    }
    tick();
    roomCountdownInterval = setInterval(tick, 500);
}

async function endRoomGame() {
    if (roomScoreSubmitted) return;
    roomScoreSubmitted = true;

    await roomRef.child(`players/${playerId}/rounds/${roomCurrentRound}`)
        .set({ score: totalScore(roomFoundWords), words: [...roomFoundWords] });
    await roomRef.child(`players/${playerId}`).update({ ready: false, closedScoreboard: false });

    roomRef.child('state').transaction(cur => cur==='playing' ? 'finished' : undefined,
        (err, committed) => { if (committed) waitForAllScores(roomCurrentRound).then(awardGamePoints); });
}

function waitForAllScores(round) {
    return new Promise(resolve => {
        const ref = roomRef.child('players');
        const bail = setTimeout(() => { ref.off('value', check); resolve(); }, 5000);
        function check(snap) {
            const players = snap.val() || {};
            const online = Object.values(players).filter(p => p.online !== false);
            if (online.length > 0 && online.every(p => p.rounds?.[round]?.score != null)) {
                clearTimeout(bail);
                ref.off('value', check);
                resolve();
            }
        }
        ref.on('value', check);
    });
}

async function awardGamePoints() {
    const round = roomCurrentRound;
    roomRef.child(`pointsRound${round}`).transaction(v => v!==null ? undefined : 'processing',
        async (err, committed) => {
            if (!committed) return;
            const snap = await roomRef.once('value');
            const data = snap.val();
            if (!data) return;
            const players = data.players || {};
            let maxScore=-1, winnerId=null;
            for (const [pid,p] of Object.entries(players)) {
                const sc = p.rounds?.[round]?.score ?? -1;
                if (sc > maxScore) { maxScore=sc; winnerId=pid; }
            }
            if (winnerId && maxScore >= 0)
                await roomRef.child(`players/${winnerId}/gamePoints`).transaction(p=>(p||0)+1);
            await roomRef.child(`pointsRound${round}`).set(`done:${winnerId||'none'}`);
        }
    );
}

// ── Scoreboard ─────────────────────────────────────────────────────────────
function renderScoreboard(data) {
    // Submit this player's score if the game ended before their countdown fired
    if (!roomScoreSubmitted && roomPlayingInitialized) {
        roomScoreSubmitted = true;
        roomRef.child(`players/${playerId}/rounds/${roomCurrentRound}`)
            .set({ score: totalScore(roomFoundWords), words: [...roomFoundWords] });
        roomRef.child(`players/${playerId}`).update({ ready: false, closedScoreboard: false });
    }
    if (roomCountdownInterval) { clearInterval(roomCountdownInterval); roomCountdownInterval=null; }

    if (!scoreBoardShown) { scoreBoardShown=true; showPanel('scoreboard'); }

    const players = data.players || {};
    const round   = data.currentRound ?? 0;
    const pointsDone = (data[`pointsRound${round}`] || '').toString().startsWith('done:');
    const entries = Object.entries(players).map(([pid,p]) => ({
        pid,
        name:       p.name || '?',
        gamePoints: p.gamePoints || 0,
        roundScore: p.rounds?.[round]?.score ?? null,
        roundWords: p.rounds?.[round]?.words || []
    })).sort((a,b) => b.gamePoints-a.gamePoints || (b.roundScore||0)-(a.roundScore||0));

    document.getElementById('player-modal-overlay')?.remove();

    const sb = document.getElementById('scoreboard-body');
    sb.innerHTML = '';

    if (!pointsDone) {
        const loader = document.createElement('div');
        loader.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.82rem;color:var(--text-muted);font-weight:600;padding:4px 0 6px';
        loader.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px"></div>Calculating winner…';
        sb.appendChild(loader);
    }

    entries.forEach((e,i) => {
        const row=document.createElement('div');
        row.className='score-row'+(i===0&&pointsDone?' gold':'');
        row.innerHTML=`<span class="score-name">${e.name}</span>
            <span class="score-gp">${e.gamePoints} pt${e.gamePoints!==1?'s':''}</span>
            <span class="score-rnd">${e.roundScore!==null?'+'+e.roundScore:'…'}</span>`;
        row.onclick = () => openPlayerModal(e.name, e.roundWords);
        sb.appendChild(row);
    });

    // Thick separator + my found words by letter count
    const sep = document.createElement('div');
    sep.style.cssText = 'border-top:3px solid var(--text-muted);margin:4px 0 2px';
    sb.appendChild(sep);

    buildWordGroup(sb, roomFoundWords, validWords, 'Your Words');
}

function buildWordGroup(container, foundSet, allWords, label) {
    if (label) {
        const title = document.createElement('div');
        title.style.cssText = 'font-size:0.82rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin:4px 0 2px';
        title.textContent = label;
        container.appendChild(title);
    }

    const groups = {};
    for (const w of allWords) {
        if (!groups[w.length]) groups[w.length] = [];
        groups[w.length].push(w);
    }
    const keys = Object.keys(groups).sort((a,b) => a-b);
    if (!keys.length) {
        const none = document.createElement('div');
        none.style.cssText = 'color:var(--text-muted);font-size:.88rem;padding:4px 0';
        none.textContent = 'No words available.';
        container.appendChild(none);
        return;
    }
    keys.forEach(len => {
        const words = groups[len].sort();
        const foundCount = words.filter(w => foundSet.has(w)).length;
        const sec = document.createElement('div'); sec.className = 'popup-section';
        const row = document.createElement('div'); row.className = 'popup-row';
        row.innerHTML = `<span class="popup-label">${len}-letter words</span><span class="popup-count">${foundCount} / ${words.length}</span>`;
        sec.appendChild(row);
        const wl = document.createElement('div'); wl.className = 'popup-words';
        words.forEach(w => {
            const chip = document.createElement('span'); chip.className = 'popup-chip'; chip.textContent = w;
            if (foundSet.has(w)) { chip.style.fontWeight = '700'; chip.style.color = '#16a34a'; }
            wl.appendChild(chip);
        });
        sec.appendChild(wl);
        container.appendChild(sec);
    });
}

function openPlayerModal(name, foundWordsArr) {
    document.getElementById('player-modal-overlay')?.remove();

    const overlay = document.createElement('div');
    overlay.id = 'player-modal-overlay';
    overlay.className = 'player-modal-overlay';
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

    const modal = document.createElement('div');
    modal.className = 'player-modal';
    modal.onclick = e => e.stopPropagation();

    const hdr = document.createElement('div');
    hdr.className = 'player-modal-hdr';
    const title = document.createElement('div');
    title.className = 'player-modal-title';
    title.textContent = name;
    const closeBtn = document.createElement('button');
    closeBtn.className = 'btn btn-outline btn-sm';
    closeBtn.textContent = '✕';
    closeBtn.onclick = () => overlay.remove();
    hdr.appendChild(title); hdr.appendChild(closeBtn);
    modal.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'player-modal-body';
    buildWordGroup(body, new Set(foundWordsArr), validWords, null);
    modal.appendChild(body);

    overlay.appendChild(modal);
    document.body.appendChild(overlay);
}

async function closeScoreboard() {
    document.getElementById('player-modal-overlay')?.remove();
    roomPlayingInitialized=false; scoreBoardShown=false; roomScoreSubmitted=false;
    roomLastPlayedRound = roomCurrentRound;
    await roomRef.update({
        [`players/${playerId}/closedScoreboard`]: true,
        [`players/${playerId}/ready`]: false
    });
}

async function leaveRoom() {
    if (roomRef) {
        try {
            roomRef.child(`players/${playerId}/online`).onDisconnect().cancel();
            await roomRef.child(`players/${playerId}`).update({ online: false, ready: false });
        } catch {}
        roomRef.off(); roomRef=null;
    }
    if (roomCountdownInterval) { clearInterval(roomCountdownInterval); roomCountdownInterval=null; }

    // Reset room state
    roomMode=false; roomId=null; roomFoundWords=new Set();
    roomPlayingInitialized=false; scoreBoardShown=false; roomScoreSubmitted=false;
    roomLastPlayedRound=-1;

    history.replaceState({}, '', location.pathname);

    // Restore solo UI
    document.getElementById('room-overlay').classList.remove('visible');
    document.getElementById('room-bar').classList.remove('visible');
    document.getElementById('game-container').style.display='';
    document.getElementById('start-room-btn').style.display='';

    // Reload solo board and progress
    resetTimer();
    await loadBoardConfig();
    loadProgress();
    calculateValidWords();
    renderBoard();
}

function shareGame() {
    if (roomMode) return;
    const secs = parseInt(localStorage.getItem('G2_share_time') || timerSeconds || 0);
    const mm = String(Math.floor(secs / 60)).padStart(2, '0');
    const ss = String(secs % 60).padStart(2, '0');
    const text = `🦃 I played Gobblegle! 🦃\nFound ${foundWords.size}/${validWords.size}\n${mm}:${ss}\nhttps://gobblegle.github.io/gobblegle/`;
    if (navigator.share) {
        navigator.share({ title: 'Gobblegle', text }).catch(() => {});
    } else {
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('share-btn');
            const prev = btn.textContent;
            btn.textContent = '✓';
            setTimeout(() => { btn.textContent = prev; }, 2000);
        }).catch(() => { prompt('Copy this:', text); });
    }
}

function shareRoom() {
    const url  = `${location.origin}${location.pathname}?room=${roomId}`;
    const text = 'Play Gobblegle with me!';
    if (navigator.share) {
        navigator.share({ title:'Gobblegle', text, url }).catch(()=>{});
    } else {
        navigator.clipboard.writeText(`${text} ${url}`).then(() => {
            const btn = event.currentTarget;
            const orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(()=>{ btn.textContent=orig; }, 2000);
        }).catch(() => { prompt('Copy this link:', url); });
    }
}

// ── Panel switching ────────────────────────────────────────────────────────
function showPanel(panel) {
    const overlay = document.getElementById('room-overlay');
    const gc      = document.getElementById('game-container');
    const bar     = document.getElementById('room-bar');
    const lobby   = document.getElementById('lobby-panel');
    const sb      = document.getElementById('scoreboard-panel');

    if (panel === 'game') {
        overlay.classList.remove('visible');
        gc.style.display  = '';
        bar.classList.add('visible');
        lobby.style.display = 'none';
        sb.style.display    = 'none';
    } else {
        overlay.classList.add('visible');
        gc.style.display  = 'none';
        bar.classList.remove('visible');
        lobby.style.display = panel==='lobby'      ? '' : 'none';
        sb.style.display    = panel==='scoreboard' ? '' : 'none';
    }
}
